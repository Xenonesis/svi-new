<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — SVI Infra Solutions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #fafafa; color: #111827;
      padding: 1rem;
    }
    .card {
      text-align: center; max-width: 420px; width: 100%;
      background: #fff; border-radius: 4px;
      padding: 3.5rem 2.5rem;
      box-shadow:
        0 1px 2px rgba(0,0,0,0.04),
        0 4px 8px rgba(0,0,0,0.04),
        0 16px 32px rgba(0,0,0,0.04);
    }
    .icon-ring {
      width: 80px; height: 80px; margin: 0 auto 1.5rem;
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: rgba(212, 175, 55, 0.04);
    }
    .icon-ring svg { width: 36px; height: 36px; color: #d4af37; }
    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.75rem; font-weight: 700;
      margin-bottom: 0.75rem; color: #111827;
    }
    p {
      font-family: 'Outfit', sans-serif;
      font-size: 0.9375rem; line-height: 1.7;
      color: #6b7280; margin-bottom: 2rem;
    }
    .btn {
      display: inline-block;
      background: #111827; color: #fff;
      text-decoration: none;
      font-family: 'Outfit', sans-serif;
      font-size: 0.75rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 0.875rem 2.25rem;
      border: none; cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #1f2937; }
    .btn:active { transform: scale(0.97); }
    .brand { margin-top: 2rem; font-size: 0.6875rem; color: #9ca3af; letter-spacing: 0.05em; }

    @media (prefers-color-scheme: dark) {
      body { background: #0b0c10; }
      .card { background: #14151a; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
      h1 { color: #f3f4f6; }
      p { color: #9ca3af; }
      .btn { background: #d4af37; color: #111827; }
      .btn:hover { background: #e6c8a0; }
      .brand { color: #6b7280; }
    }
  </style>
</head>
<body>
  <div class="card" role="main">
    <div class="icon-ring" aria-hidden="true">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M18.364 5.636a9 9 0 11-12.728 0m9.9 4.243l-4.243 4.242m0 0l-4.243-4.242m4.243 4.242V3" />
      </svg>
    </div>
    <h1>You're Offline</h1>
    <p>
      Connect to the internet and try again. Previously viewed pages are still available from your cache.
    </p>
    <button class="btn" onclick="window.location.reload()" id="retryBtn">Retry</button>
    <p class="brand">SVI Infra Solutions — Premium Real Estate Developer</p>
  </div>
  <script>
    if ('onLine' in navigator) {
      window.addEventListener('online', function () { window.location.reload(); });
    }
  </script>
</body>
</html>
